<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku — Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.7;
            color: #1d1d1f;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
        }
        .icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #d4af37;
            font-weight: 700;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { font-size: 15px; color: #86868b; margin-bottom: 32px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        a {
            display: block;
            padding: 14px 20px;
            background: #f5f5f7;
            border-radius: 12px;
            color: #1d1d1f;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.2s;
        }
        a:hover { background: #e8e8ed; }
        a span { color: #86868b; font-size: 13px; display: block; margin-top: 2px; font-weight: 400; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">9</div>
        <h1>Sudoku</h1>
        <p class="subtitle">Classic puzzle game for iOS</p>
        <div class="links">
            <a href="privacy.html">
                Privacy Policy
                <span>How we handle your data</span>
            </a>
            <a href="terms.html">
                Terms of Use
                <span>Conditions for using the app</span>
            </a>
            <a href="https://github.com/steinikk/sudoku-support/issues">
                Support
                <span>Report issues or ask questions</span>
            </a>
        </div>
    </div>
</body>
</html>
